name: Build and Deploy to Alibaba Cloud SAE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  ACR_EE_REGISTRY_VPC: lly-nw-cafe-d-acr-01-registry-vpc.cn-shanghai.cr.aliyuncs.com
  ACR_NAMESPACE: myapp-dev
  IMAGE_NAME: myapp

jobs:
  build:
    runs-on: [self-hosted, linux, aliyun]
    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ env.ACR_EE_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_url=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR Enterprise Edition (VPC)
        run: |
          echo "${{ secrets.ACR_EE_PASSWORD }}" | docker login \
            --username "${{ secrets.ACR_EE_USERNAME }}" \
            --password-stdin \
            "${{ env.ACR_EE_REGISTRY_VPC }}"

      - name: Build and push Docker image
        run: |
          docker build -t "${{ steps.meta.outputs.image_url }}" .
          docker tag "${{ steps.meta.outputs.image_url }}" "${{ env.ACR_EE_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ steps.meta.outputs.image_url }}"
          docker push "${{ env.ACR_EE_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"

  deploy:
    runs-on: [self-hosted, linux, aliyun]
    needs: build
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        env:
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SECURITY_TOKEN: ${{ secrets.ALICLOUD_SECURITY_TOKEN }}
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        env:
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SECURITY_TOKEN: ${{ secrets.ALICLOUD_SECURITY_TOKEN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_image_url: ${{ needs.build.outputs.image_url }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_vswitch_id: ${{ vars.VSWITCH_ID }}
          TF_VAR_env: ${{ inputs.environment || 'dev' }}
        run: terraform apply -auto-approve
