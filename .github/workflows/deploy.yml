name: Build and Deploy to Alibaba Cloud SAE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  ACR_EE_REGISTRY_VPC: lly-nw-cafe-d-acr-01-registry-vpc.cn-shanghai.cr.aliyuncs.com
  ACR_NAMESPACE: myapp-dev
  IMAGE_NAME: myapp

jobs:
  build:
    runs-on: [self-hosted, linux, aliyun]
    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ env.ACR_EE_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "image_url=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to ACR Enterprise Edition (VPC)
        env:
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SECURITY_TOKEN: ${{ secrets.ALICLOUD_SECURITY_TOKEN }}
        run: |
          # Get temporary credentials via GetAuthorizationToken API
          TOKEN_JSON=$(python3 - <<'PYEOF'
          import os, hmac, hashlib, base64, time, json, urllib.request, urllib.parse
          from datetime import datetime, timezone

          ak = os.environ["ALICLOUD_ACCESS_KEY"]
          sk = os.environ["ALICLOUD_SECRET_KEY"]
          st = os.environ.get("ALICLOUD_SECURITY_TOKEN", "")
          instance_id = "cri-kex0e6y319lsjt27"

          params = {
              "Action": "GetAuthorizationToken",
              "Version": "2018-12-01",
              "Format": "JSON",
              "AccessKeyId": ak,
              "SignatureMethod": "HMAC-SHA1",
              "Timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "SignatureVersion": "1.0",
              "SignatureNonce": str(int(time.time() * 1000)),
              "InstanceId": instance_id,
          }
          if st:
              params["SecurityToken"] = st

          sorted_params = sorted(params.items())
          query = urllib.parse.urlencode(sorted_params)
          string_to_sign = "GET&%2F&" + urllib.parse.quote(query, safe="")
          h = hmac.new((sk + "&").encode(), string_to_sign.encode(), hashlib.sha1)
          params["Signature"] = base64.b64encode(h.digest()).decode()

          url = "https://cr.cn-shanghai.aliyuncs.com/?" + urllib.parse.urlencode(params)
          resp = urllib.request.urlopen(url, timeout=30)
          print(resp.read().decode())
          PYEOF
          )
          ACR_USER=$(echo "$TOKEN_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['TempUsername'])")
          ACR_PASS=$(echo "$TOKEN_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['AuthorizationToken'])")
          echo "$ACR_PASS" | docker login \
            --username "$ACR_USER" \
            --password-stdin \
            "${{ env.ACR_EE_REGISTRY_VPC }}"

      - name: Build and push Docker image
        run: |
          docker build -t "${{ steps.meta.outputs.image_url }}" .
          docker tag "${{ steps.meta.outputs.image_url }}" "${{ env.ACR_EE_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ steps.meta.outputs.image_url }}"
          docker push "${{ env.ACR_EE_REGISTRY_VPC }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"

  deploy:
    runs-on: [self-hosted, linux, aliyun]
    needs: build
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        env:
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SECURITY_TOKEN: ${{ secrets.ALICLOUD_SECURITY_TOKEN }}
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        env:
          ALICLOUD_ACCESS_KEY: ${{ secrets.ALICLOUD_ACCESS_KEY }}
          ALICLOUD_SECRET_KEY: ${{ secrets.ALICLOUD_SECRET_KEY }}
          ALICLOUD_SECURITY_TOKEN: ${{ secrets.ALICLOUD_SECURITY_TOKEN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_image_url: ${{ needs.build.outputs.image_url }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_vswitch_id: ${{ vars.VSWITCH_ID }}
          TF_VAR_env: ${{ inputs.environment || 'dev' }}
        run: terraform apply -auto-approve
